<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="540" viewBox="0 0 1000 540" role="img" aria-labelledby="title desc">
  <title id="title">対数線形近似の概念図</title>
  <desc id="desc">非線形の水準方程式を定常状態の周りで対数偏差の線形方程式に変換する流れを示す。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#526070"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1000" height="540" fill="#ffffff"/>
  <rect x="55" y="45" width="890" height="425" rx="14" fill="#f8fafc" stroke="#d9e0ea"/>
  <g stroke="#526070" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <line x1="272" y1="190" x2="358" y2="190"/>
    <line x1="642" y1="190" x2="728" y2="190"/>
  </g>
  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" filter="url(#shadow)">
    <rect x="82" y="105" width="190" height="170" rx="12" fill="#eaf2ff" stroke="#2f6fbe" stroke-width="2"/>
    <rect x="358" y="105" width="284" height="170" rx="12" fill="#fff3e8" stroke="#d9792f" stroke-width="2"/>
    <rect x="728" y="105" width="190" height="170" rx="12" fill="#eef8ef" stroke="#379b55" stroke-width="2"/>
  </g>
  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" fill="#20242a">
    <text x="107" y="145" font-size="23" font-weight="700">水準の非線形式</text>
    <text x="112" y="182" font-size="20">Y = A Kᵅ N¹⁻ᵅ</text>
    <text x="112" y="218" font-size="17">積・商・べき乗</text>
    <text x="112" y="244" font-size="17">和も含む</text>
    <text x="390" y="145" font-size="23" font-weight="700">定常状態の周りで近似</text>
    <text x="390" y="181" font-size="19">xₜ = ln Xₜ − ln X</text>
    <text x="390" y="216" font-size="17">小さい乖離だけを残す</text>
    <text x="390" y="242" font-size="17">高次の項は無視</text>
    <text x="756" y="145" font-size="23" font-weight="700">線形方程式</text>
    <text x="756" y="182" font-size="20">y = a + αk + (1−α)n</text>
    <text x="756" y="218" font-size="17">DSGEの解法へ</text>
    <text x="756" y="244" font-size="17">IRFを計算</text>
  </g>
  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif">
    <rect x="110" y="330" width="780" height="92" rx="12" fill="#ffffff" stroke="#d9e0ea"/>
    <text x="136" y="360" font-size="21" font-weight="700" fill="#20242a">よく使う変換</text>
    <text x="136" y="394" font-size="18" fill="#2f6fbe">積：</text>
    <text x="178" y="394" font-size="18" fill="#20242a">XY → x + y</text>
    <text x="330" y="394" font-size="18" fill="#d9792f">商：</text>
    <text x="372" y="394" font-size="18" fill="#20242a">X/Y → x − y</text>
    <text x="526" y="394" font-size="18" fill="#379b55">べき：</text>
    <text x="586" y="394" font-size="18" fill="#20242a">Xᵅ → αx</text>
    <text x="710" y="394" font-size="18" fill="#8d5ab8">和：</text>
    <text x="752" y="394" font-size="18" fill="#20242a">C+G → シェアで加重</text>
  </g>
</svg>
