<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">AR(1)インパルス応答の数値シミュレーション</title>
  <desc id="desc">初期ショック1に対する反応は、rhoが大きいほど長く残る。rhoが0.5, 0.8, 0.9のケースを比較する。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b2f36"/>
    </marker>
  </defs>
  <rect width="980" height="560" fill="#ffffff"/>
  <rect x="62" y="52" width="850" height="404" rx="10" fill="#fbfcff" stroke="#d9e0ea"/>
  <g stroke="#e8ecf3" stroke-width="1">
    <line x1="100" y1="420" x2="840" y2="420"/>
    <line x1="100" y1="340" x2="840" y2="340"/>
    <line x1="100" y1="260" x2="840" y2="260"/>
    <line x1="100" y1="180" x2="840" y2="180"/>
    <line x1="100" y1="100" x2="840" y2="100"/>
    <line x1="100" y1="100" x2="100" y2="420"/>
    <line x1="220" y1="100" x2="220" y2="420"/>
    <line x1="340" y1="100" x2="340" y2="420"/>
    <line x1="460" y1="100" x2="460" y2="420"/>
    <line x1="580" y1="100" x2="580" y2="420"/>
    <line x1="700" y1="100" x2="700" y2="420"/>
    <line x1="820" y1="100" x2="820" y2="420"/>
  </g>
  <g stroke="#2b2f36" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
    <line x1="100" y1="420" x2="860" y2="420"/>
    <line x1="100" y1="420" x2="100" y2="78"/>
  </g>
  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" fill="#20242a">
    <text x="870" y="428" font-size="20">h</text>
    <text x="82" y="72" font-size="20">反応</text>
    <text x="92" y="452" font-size="15">0</text>
    <text x="214" y="452" font-size="15">2</text>
    <text x="334" y="452" font-size="15">4</text>
    <text x="454" y="452" font-size="15">6</text>
    <text x="574" y="452" font-size="15">8</text>
    <text x="690" y="452" font-size="15">10</text>
    <text x="810" y="452" font-size="15">12</text>
    <text x="62" y="425" font-size="15">0</text>
    <text x="54" y="345" font-size="15">0.25</text>
    <text x="54" y="265" font-size="15">0.50</text>
    <text x="54" y="185" font-size="15">0.75</text>
    <text x="62" y="105" font-size="15">1</text>
  </g>
  <polyline points="100,100 160,260 220,340 280,380 340,400 400,410 460,415 520,417.5 580,418.8 640,419.4 700,419.7 760,419.9 820,420" fill="none" stroke="#2f6fbe" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="100,100 160,164 220,215.2 280,256.96 340,290.77 400,317.86 460,339.43 520,356.55 580,370.23 640,381.18 700,389.94 760,396.95 820,402.56" fill="none" stroke="#379b55" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="100,100 160,132 220,160.8 280,186.72 340,210.05 400,231.05 460,249.95 520,266.96 580,282.26 640,296.04 700,308.43 760,319.59 820,329.63" fill="none" stroke="#d9792f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif">
    <rect x="620" y="82" width="250" height="92" rx="8" fill="#ffffff" stroke="#d9e0ea"/>
    <line x1="642" y1="108" x2="690" y2="108" stroke="#2f6fbe" stroke-width="4"/>
    <text x="704" y="114" font-size="17" fill="#20242a">ρ = 0.5  半減期 1期</text>
    <line x1="642" y1="132" x2="690" y2="132" stroke="#379b55" stroke-width="4"/>
    <text x="704" y="138" font-size="17" fill="#20242a">ρ = 0.8  半減期 3.1期</text>
    <line x1="642" y1="156" x2="690" y2="156" stroke="#d9792f" stroke-width="4"/>
    <text x="704" y="162" font-size="17" fill="#20242a">ρ = 0.9  半減期 6.6期</text>
    <text x="92" y="515" font-size="22" font-weight="700" fill="#20242a">数値シミュレーション：yₕ = ρʰ</text>
    <text x="350" y="515" font-size="18" fill="#555f6f">同じ1単位ショックでも、ρが大きいほど効果はゆっくり減衰する</text>
  </g>
</svg>
