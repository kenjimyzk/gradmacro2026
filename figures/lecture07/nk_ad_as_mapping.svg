<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">NK版AD-AS表現</title>
  <desc id="desc">横軸を需給ギャップ、縦軸をインフレ率に取り、NKフィリップス曲線をNK-AS、IS曲線とテーラールールを合わせた関係をNK-ADとして示す。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#526070"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f6fbe"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="980" height="620" fill="#ffffff"/>
  <rect x="48" y="42" width="884" height="520" rx="16" fill="#f8fafc" stroke="#d9e0ea"/>
  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="82" y="88" font-size="30" font-weight="700" fill="#1f2937">NK版 AD-AS 表現</text>
    <text x="82" y="119" font-size="18" fill="#566273">第1回の AD-AS を、需給ギャップとインフレ率の平面で読み替える</text>
  </g>

  <rect x="110" y="150" width="560" height="330" rx="8" fill="#ffffff" stroke="#e0e6ef"/>
  <g stroke="#eef2f7" stroke-width="1">
    <line x1="190" y1="170" x2="190" y2="456"/>
    <line x1="290" y1="170" x2="290" y2="456"/>
    <line x1="390" y1="170" x2="390" y2="456"/>
    <line x1="490" y1="170" x2="490" y2="456"/>
    <line x1="590" y1="170" x2="590" y2="456"/>
    <line x1="132" y1="230" x2="642" y2="230"/>
    <line x1="132" y1="310" x2="642" y2="310"/>
    <line x1="132" y1="390" x2="642" y2="390"/>
  </g>
  <g stroke="#2b2f36" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
    <line x1="132" y1="456" x2="648" y2="456"/>
    <line x1="132" y1="456" x2="132" y2="164"/>
  </g>
  <line x1="390" y1="170" x2="390" y2="456" stroke="#8792a2" stroke-width="2" stroke-dasharray="7 7"/>
  <text x="654" y="464" font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="20" fill="#20242a">x_t</text>
  <text x="108" y="158" font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="20" fill="#20242a">pi_t</text>
  <text x="372" y="505" font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="17" fill="#566273">x_t = 0</text>

  <path d="M 196 420 C 286 362 412 282 596 188" fill="none" stroke="#d45d48" stroke-width="5" stroke-linecap="round"/>
  <path d="M 196 198 C 316 254 456 330 604 422" fill="none" stroke="#2f6fbe" stroke-width="5" stroke-linecap="round"/>
  <path d="M 252 176 C 372 232 512 308 660 400" fill="none" stroke="#2f6fbe" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 8"/>
  <circle cx="392" cy="306" r="8" fill="#20242a" filter="url(#shadow)"/>
  <circle cx="432" cy="284" r="8" fill="#2f6fbe" filter="url(#shadow)"/>
  <path d="M 402 300 L 426 286" fill="none" stroke="#2f6fbe" stroke-width="2.4" marker-end="url(#arrow-blue)"/>

  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="504" y="205" font-size="20" font-weight="700" fill="#d45d48">NK-AS</text>
    <text x="506" y="230" font-size="15" fill="#6b2b24">pi_t = kappa x_t</text>
    <text x="472" y="420" font-size="20" font-weight="700" fill="#2f6fbe">NK-AD</text>
    <text x="474" y="445" font-size="15" fill="#214d85">IS + Taylor rule</text>
    <text x="446" y="274" font-size="16" fill="#2f6fbe">金融緩和など</text>
    <text x="446" y="296" font-size="16" fill="#2f6fbe">AD は右上へ</text>
  </g>

  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" filter="url(#shadow)">
    <rect x="710" y="168" width="176" height="92" rx="10" fill="#fff3e8" stroke="#d9792f" stroke-width="2"/>
    <rect x="710" y="286" width="176" height="92" rx="10" fill="#eaf2ff" stroke="#2f6fbe" stroke-width="2"/>
    <rect x="710" y="404" width="176" height="92" rx="10" fill="#eef8ef" stroke="#379b55" stroke-width="2"/>
  </g>
  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" fill="#20242a">
    <text x="732" y="202" font-size="19" font-weight="700">縦軸</text>
    <text x="732" y="230" font-size="16">物価水準 P ではなく</text>
    <text x="732" y="252" font-size="16">インフレ率 pi_t</text>
    <text x="732" y="320" font-size="19" font-weight="700">横軸</text>
    <text x="732" y="348" font-size="16">産出 Y ではなく</text>
    <text x="732" y="370" font-size="16">需給ギャップ x_t</text>
    <text x="732" y="438" font-size="19" font-weight="700">均衡</text>
    <text x="732" y="466" font-size="16">NK-AS と NK-AD の</text>
    <text x="732" y="488" font-size="16">交点で決まる</text>
  </g>
</svg>
