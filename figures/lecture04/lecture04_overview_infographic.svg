<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">第4回講義の全体像</title>
  <desc id="desc">資本なしRBCモデルで、家計、企業、市場均衡、技術ショック、労働供給の効果分解、自然利子率、第5回への接続を示す。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#526070"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1120" height="650" fill="#ffffff"/>
  <rect x="50" y="40" width="1020" height="560" rx="18" fill="#f8fafc" stroke="#d9e0ea"/>
  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="80" y="86" font-size="32" font-weight="700" fill="#1f2937">第4回の地図：資本なしRBCモデル</text>
    <text x="80" y="119" font-size="19" fill="#566273">家計と企業の静学的条件が、柔軟価格の実物配分を決める</text>
  </g>
  <g stroke="#526070" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M 310 248 L 418 248"/>
    <path d="M 810 248 L 702 248"/>
    <path d="M 560 318 L 560 392"/>
    <path d="M 562 188 C 640 138 741 135 812 188"/>
    <path d="M 456 506 C 360 486 276 430 218 338"/>
    <path d="M 664 506 C 760 486 844 430 902 338"/>
  </g>
  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" filter="url(#shadow)">
    <rect x="90" y="170" width="220" height="156" rx="12" fill="#eaf2ff" stroke="#2f6fbe" stroke-width="2"/>
    <rect x="450" y="160" width="220" height="168" rx="12" fill="#eef8ef" stroke="#379b55" stroke-width="2"/>
    <rect x="810" y="170" width="220" height="156" rx="12" fill="#fff3e8" stroke="#d9792f" stroke-width="2"/>
    <rect x="384" y="396" width="352" height="176" rx="12" fill="#f2f4f8" stroke="#697386" stroke-width="2"/>
  </g>
  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" fill="#20242a">
    <text x="118" y="207" font-size="22" font-weight="700">家計</text>
    <text x="118" y="238" font-size="17">消費 C_t と労働 N_t</text>
    <text x="118" y="264" font-size="17">MRS_t = W_t</text>
    <text x="118" y="290" font-size="17">MRIS_{t,t+1} = Q_{t,t+1}</text>

    <text x="478" y="198" font-size="22" font-weight="700">市場均衡</text>
    <text x="478" y="229" font-size="17">Y_t = C_t</text>
    <text x="478" y="255" font-size="17">B_t = 0, Theta_t = 1</text>
    <text x="478" y="281" font-size="17" font-weight="700">MRS_t = W_t = MPN_t</text>

    <text x="838" y="207" font-size="22" font-weight="700">企業</text>
    <text x="838" y="238" font-size="17">Y_t = exp(a_t)F(N_t)</text>
    <text x="838" y="264" font-size="17">労働需要</text>
    <text x="838" y="290" font-size="17">W_t = MPN_t</text>

    <text x="412" y="436" font-size="22" font-weight="700">技術ショックと解</text>
    <text x="412" y="468" font-size="17">a_t が N,Y,C,W を同時に動かす</text>
    <text x="412" y="493" font-size="17">代替効果 vs 所得効果</text>
    <text x="412" y="518" font-size="17">y_t = zeta_a a_t, r_t = gamma E_t(c_{t+1}-c_t)</text>
    <text x="412" y="543" font-size="17">第5回: Y_t = C_t + G_t</text>
  </g>
</svg>
