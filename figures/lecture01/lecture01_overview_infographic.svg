<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="680" viewBox="0 0 1100 680" role="img" aria-labelledby="title desc">
  <title id="title">第1回講義の全体像</title>
  <desc id="desc">学部マクロの主要モデルから、期待、政策評価、ルーカス批判、ミクロ的基礎づけ、DSGEモデルへ進む流れを示すインフォグラフィック。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#526070"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.13"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#214f7a"/>
      <stop offset="55%" stop-color="#3f7b72"/>
      <stop offset="100%" stop-color="#8b5a3c"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="680" fill="#ffffff"/>
  <rect x="48" y="38" width="1004" height="604" rx="18" fill="#f8fafc" stroke="#d9e0ea"/>
  <rect x="48" y="38" width="1004" height="92" rx="18" fill="url(#headerGrad)"/>
  <rect x="48" y="104" width="1004" height="26" fill="#8b5a3c"/>
  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="82" y="83" font-size="32" font-weight="700" fill="#ffffff">第1回の全体像</text>
    <text x="82" y="113" font-size="19" fill="#eef6ff">学部マクロの復習から、現代マクロの分析枠組みへ</text>
    <text x="820" y="92" font-size="18" fill="#ffffff" opacity="0.92">Macroeconomics B</text>
  </g>

  <g stroke="#526070" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M 245 246 C 285 246 301 246 337 246"/>
    <path d="M 533 246 C 573 246 589 246 625 246"/>
    <path d="M 821 246 C 861 246 877 246 913 246"/>
    <path d="M 917 308 C 878 370 812 404 749 421"/>
    <path d="M 632 454 C 574 455 523 455 470 455"/>
    <path d="M 351 421 C 292 399 236 366 196 309"/>
  </g>

  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" filter="url(#shadow)">
    <rect x="82" y="168" width="202" height="156" rx="12" fill="#eaf2ff" stroke="#2f6fbe" stroke-width="2"/>
    <rect x="370" y="168" width="202" height="156" rx="12" fill="#eef8ef" stroke="#379b55" stroke-width="2"/>
    <rect x="658" y="168" width="202" height="156" rx="12" fill="#fff3e8" stroke="#d9792f" stroke-width="2"/>
    <rect x="82" y="384" width="202" height="156" rx="12" fill="#f6edf9" stroke="#8d5ab8" stroke-width="2"/>
    <rect x="370" y="384" width="202" height="156" rx="12" fill="#edf6f8" stroke="#27899a" stroke-width="2"/>
    <rect x="658" y="384" width="202" height="156" rx="12" fill="#f2f4f8" stroke="#697386" stroke-width="2"/>
  </g>

  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif">
    <g fill="#20242a">
      <text x="106" y="205" font-size="24" font-weight="700">IS-LM</text>
      <text x="106" y="234" font-size="17">財市場と貨幣市場</text>
      <text x="106" y="260" font-size="17">産出量と利子率</text>
      <text x="106" y="286" font-size="17">政策の短期効果</text>

      <text x="394" y="205" font-size="24" font-weight="700">AD-AS</text>
      <text x="394" y="234" font-size="17">総需要と総供給</text>
      <text x="394" y="260" font-size="17">短期と長期の違い</text>
      <text x="394" y="286" font-size="17">自然産出量</text>

      <text x="682" y="205" font-size="24" font-weight="700">フィリップス曲線</text>
      <text x="682" y="234" font-size="17">インフレと失業</text>
      <text x="682" y="260" font-size="17">期待インフレ</text>
      <text x="682" y="286" font-size="17">自然失業率</text>

      <text x="106" y="421" font-size="24" font-weight="700">総需要管理政策</text>
      <text x="106" y="450" font-size="17">財政政策と金融政策</text>
      <text x="106" y="476" font-size="17">クラウディングアウト</text>
      <text x="106" y="502" font-size="17">短期効果と限界</text>

      <text x="394" y="421" font-size="24" font-weight="700">ルーカス批判</text>
      <text x="394" y="450" font-size="17">政策が変わると</text>
      <text x="394" y="476" font-size="17">期待と行動も変化</text>
      <text x="394" y="502" font-size="17">経験則は不安定</text>

      <text x="682" y="421" font-size="24" font-weight="700">現代マクロへ</text>
      <text x="682" y="450" font-size="17">ミクロ的基礎づけ</text>
      <text x="682" y="476" font-size="17">合理的期待</text>
      <text x="682" y="502" font-size="17">DSGEモデル</text>
    </g>

    <g fill="none" stroke-linecap="round">
      <path d="M 112 304 C 150 278 205 278 252 304" stroke="#2f6fbe" stroke-width="4"/>
      <path d="M 399 306 C 441 278 506 278 545 306" stroke="#379b55" stroke-width="4"/>
      <path d="M 690 304 C 732 274 795 274 836 304" stroke="#d9792f" stroke-width="4"/>
      <path d="M 111 518 C 158 493 207 493 254 518" stroke="#8d5ab8" stroke-width="4"/>
      <path d="M 403 518 C 442 491 500 491 540 518" stroke="#27899a" stroke-width="4"/>
      <path d="M 688 518 L 836 518" stroke="#697386" stroke-width="4"/>
    </g>

    <g>
      <circle cx="940" cy="250" r="54" fill="#ffffff" stroke="#d9e0ea" stroke-width="2"/>
      <text x="940" y="241" font-size="18" font-weight="700" fill="#20242a" text-anchor="middle">橋渡し</text>
      <text x="940" y="267" font-size="15" fill="#555f6f" text-anchor="middle">学部 → 大学院</text>
    </g>

    <rect x="90" y="579" width="920" height="38" rx="19" fill="#ffffff" stroke="#d9e0ea"/>
    <text x="550" y="604" font-size="18" fill="#46515f" text-anchor="middle">ポイント：古いモデルを覚えるだけでなく、なぜ現代マクロがミクロ的基礎づけを必要とするのかを理解する</text>
  </g>
</svg>
