<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc">
  <title id="title">第1回講義の全体像</title>
  <desc id="desc">ケインジアン・クロスからIS-LM、AD-AS、フィリップス曲線、総需要管理政策、ルーカス批判、現代マクロへ進む流れを示すインフォグラフィック。自然産出量と需給ギャップへの橋渡しを強調する。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#526070"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.13"/>
    </filter>
    <linearGradient id="headerGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#214f7a"/>
      <stop offset="55%" stop-color="#3f7b72"/>
      <stop offset="100%" stop-color="#8b5a3c"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="720" fill="#ffffff"/>
  <rect x="48" y="38" width="1004" height="644" rx="18" fill="#f8fafc" stroke="#d9e0ea"/>
  <rect x="48" y="38" width="1004" height="92" rx="18" fill="url(#headerGrad)"/>
  <rect x="48" y="104" width="1004" height="26" fill="#8b5a3c"/>

  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="82" y="83" font-size="32" font-weight="700" fill="#ffffff">第1回の全体像</text>
    <text x="82" y="113" font-size="19" fill="#eef6ff">学部マクロの復習から、現代マクロの分析枠組みへ</text>
    <text x="820" y="92" font-size="18" fill="#ffffff" opacity="0.92">Macroeconomics B</text>
  </g>

  <g stroke="#526070" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M 342 239 C 372 239 389 239 420 239"/>
    <path d="M 680 239 C 710 239 727 239 758 239"/>
    <path d="M 888 314 C 831 360 745 385 689 407"/>
    <path d="M 584 481 C 548 481 522 481 494 481"/>
    <path d="M 333 481 C 305 481 292 481 292 481"/>
  </g>

  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" filter="url(#shadow)">
    <rect x="82" y="166" width="260" height="148" rx="12" fill="#eaf2ff" stroke="#2f6fbe" stroke-width="2"/>
    <rect x="420" y="166" width="260" height="148" rx="12" fill="#eef8ef" stroke="#379b55" stroke-width="2"/>
    <rect x="758" y="166" width="260" height="148" rx="12" fill="#fff3e8" stroke="#d9792f" stroke-width="2"/>
    <rect x="82" y="408" width="210" height="148" rx="12" fill="#f6edf9" stroke="#8d5ab8" stroke-width="2"/>
    <rect x="333" y="408" width="210" height="148" rx="12" fill="#fff8df" stroke="#c09a2c" stroke-width="2"/>
    <rect x="584" y="408" width="210" height="148" rx="12" fill="#edf6f8" stroke="#27899a" stroke-width="2"/>
    <rect x="835" y="408" width="210" height="148" rx="12" fill="#f2f4f8" stroke="#697386" stroke-width="2"/>
  </g>

  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" fill="#20242a">
    <text x="106" y="204" font-size="22" font-weight="700">ケインジアン・クロス</text>
    <text x="106" y="235" font-size="17">計画支出と45度線</text>
    <text x="106" y="262" font-size="17">乗数メカニズム</text>
    <text x="106" y="289" font-size="17">IS曲線への入口</text>

    <text x="444" y="204" font-size="24" font-weight="700">IS-LM</text>
    <text x="444" y="235" font-size="17">財市場と貨幣市場</text>
    <text x="444" y="262" font-size="17">産出量と利子率</text>
    <text x="444" y="289" font-size="17">政策の短期効果</text>

    <text x="782" y="204" font-size="24" font-weight="700">AD-AS</text>
    <text x="782" y="235" font-size="17">総需要と総供給</text>
    <text x="782" y="262" font-size="17">短期と長期の違い</text>
    <text x="782" y="289" font-size="17">自然産出量</text>

    <text x="106" y="447" font-size="22" font-weight="700">フィリップス曲線</text>
    <text x="106" y="478" font-size="16">インフレと失業</text>
    <text x="106" y="504" font-size="16">期待インフレ</text>
    <text x="106" y="530" font-size="16">需給ギャップ</text>

    <text x="357" y="447" font-size="22" font-weight="700">総需要管理政策</text>
    <text x="357" y="478" font-size="16">財政・金融政策</text>
    <text x="357" y="504" font-size="16">クラウディングアウト</text>
    <text x="357" y="530" font-size="16">短期効果と限界</text>

    <text x="608" y="447" font-size="22" font-weight="700">ルーカス批判</text>
    <text x="608" y="478" font-size="16">政策が変わると</text>
    <text x="608" y="504" font-size="16">期待と行動も変化</text>
    <text x="608" y="530" font-size="16">経験則は不安定</text>

    <text x="859" y="447" font-size="22" font-weight="700">現代マクロへ</text>
    <text x="859" y="478" font-size="16">ミクロ的基礎づけ</text>
    <text x="859" y="504" font-size="16">合理的期待</text>
    <text x="859" y="530" font-size="16">DSGE・NKクロス</text>
  </g>

  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif">
    <rect x="90" y="612" width="920" height="38" rx="19" fill="#ffffff" stroke="#d9e0ea"/>
    <text x="550" y="637" font-size="18" fill="#46515f" text-anchor="middle">ポイント：45度線の乗数直観から出発し、なぜ現代マクロがミクロ的基礎づけを必要とするのかを理解する</text>
  </g>
</svg>
