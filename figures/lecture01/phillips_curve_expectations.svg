<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Expectations-augmented Phillips curve</title>
  <desc id="desc">Short-run Phillips curves slope downward. Higher expected inflation shifts the curve upward. The long-run Phillips curve is vertical at the natural rate of unemployment.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b2f36"/>
    </marker>
    <marker id="smallArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a4db3"/>
    </marker>
  </defs>
  <rect width="900" height="560" fill="#ffffff"/>
  <rect x="84" y="52" width="740" height="408" rx="8" fill="#fbfcff" stroke="#d9dee8"/>
  <g stroke="#e8ecf3" stroke-width="1">
    <line x1="160" y1="92" x2="160" y2="430"/>
    <line x1="260" y1="92" x2="260" y2="430"/>
    <line x1="360" y1="92" x2="360" y2="430"/>
    <line x1="460" y1="92" x2="460" y2="430"/>
    <line x1="560" y1="92" x2="560" y2="430"/>
    <line x1="660" y1="92" x2="660" y2="430"/>
    <line x1="760" y1="92" x2="760" y2="430"/>
    <line x1="110" y1="135" x2="790" y2="135"/>
    <line x1="110" y1="205" x2="790" y2="205"/>
    <line x1="110" y1="275" x2="790" y2="275"/>
    <line x1="110" y1="345" x2="790" y2="345"/>
    <line x1="110" y1="415" x2="790" y2="415"/>
  </g>
  <g stroke="#2b2f36" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
    <line x1="110" y1="430" x2="805" y2="430"/>
    <line x1="110" y1="430" x2="110" y2="70"/>
  </g>
  <text x="815" y="438" font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="22" fill="#20242a">u</text>
  <text x="95" y="62" font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="24" fill="#20242a">π</text>
  <line x1="455" y1="92" x2="455" y2="430" stroke="#45505f" stroke-width="4" stroke-linecap="round"/>
  <path d="M 170 180 C 330 220 515 292 710 385" fill="none" stroke="#2f6fbe" stroke-width="5" stroke-linecap="round"/>
  <path d="M 170 110 C 330 150 515 222 710 315" fill="none" stroke="#d45d48" stroke-width="5" stroke-linecap="round"/>
  <line x1="300" y1="224" x2="300" y2="154" stroke="#7a4db3" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#smallArrow)"/>
  <line x1="520" y1="306" x2="520" y2="236" stroke="#7a4db3" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#smallArrow)"/>
  <text x="466" y="100" font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="22" font-weight="700" fill="#45505f">長期PC</text>
  <text x="680" y="392" font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="21" font-weight="700" fill="#2f6fbe">短期PC</text>
  <text x="680" y="318" font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="21" font-weight="700" fill="#d45d48">期待上昇後</text>
  <text x="340" y="142" font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="18" fill="#7a4db3">πᵉ上昇で上方シフト</text>
  <line x1="455" y1="430" x2="455" y2="445" stroke="#2b2f36" stroke-width="2"/>
  <text x="435" y="472" font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="22" fill="#20242a">uₙ</text>
  <text x="92" y="515" font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="22" font-weight="700" fill="#20242a">期待修正型フィリップス曲線</text>
  <text x="375" y="515" font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" font-size="18" fill="#555f6f">短期のトレードオフと長期の自然失業率</text>
</svg>
