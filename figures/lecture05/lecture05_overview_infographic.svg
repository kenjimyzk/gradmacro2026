<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" role="img" aria-labelledby="title desc">
  <title id="title">第5回講義の全体像</title>
  <desc id="desc">政府部門を導入し、政府予算制約、資源制約、政府支出ショック、税の帰着、税制のくさびを整理する図。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#526070"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1120" height="650" fill="#ffffff"/>
  <rect x="50" y="40" width="1020" height="560" rx="18" fill="#f8fafc" stroke="#d9e0ea"/>
  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif">
    <text x="80" y="86" font-size="32" font-weight="700" fill="#1f2937">第5回の地図：政府部門を入れる</text>
    <text x="80" y="119" font-size="19" fill="#566273">第4回の実物配分に、政府予算制約と政府支出ショックを加える</text>
  </g>
  <g stroke="#526070" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M 310 238 L 418 238"/>
    <path d="M 702 238 L 810 238"/>
    <path d="M 560 306 L 560 386"/>
    <path d="M 276 430 C 350 378 438 346 512 322"/>
    <path d="M 848 430 C 772 378 682 346 606 322"/>
  </g>
  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" filter="url(#shadow)">
    <rect x="88" y="168" width="222" height="146" rx="12" fill="#eaf2ff" stroke="#2f6fbe" stroke-width="2"/>
    <rect x="418" y="156" width="284" height="168" rx="12" fill="#eef8ef" stroke="#379b55" stroke-width="2"/>
    <rect x="810" y="168" width="222" height="146" rx="12" fill="#fff3e8" stroke="#d9792f" stroke-width="2"/>
    <rect x="130" y="420" width="290" height="116" rx="12" fill="#f6edf9" stroke="#8d5ab8" stroke-width="2"/>
    <rect x="700" y="420" width="290" height="138" rx="12" fill="#f2f4f8" stroke="#697386" stroke-width="2"/>
  </g>
  <g font-family="Arial, 'Hiragino Sans', 'Yu Gothic', sans-serif" fill="#20242a">
    <text x="116" y="205" font-size="22" font-weight="700">第4回の実物側</text>
    <text x="116" y="236" font-size="17">家計と企業のFOC</text>
    <text x="116" y="262" font-size="17">MRS = W = MPN</text>
    <text x="116" y="288" font-size="17">技術ショック a_t</text>

    <text x="446" y="194" font-size="22" font-weight="700">政府部門</text>
    <text x="446" y="225" font-size="17">G_t, TR_t, TX_t, B_t</text>
    <text x="446" y="251" font-size="17">PB_t = TX_t - TR_t - G_t</text>
    <text x="446" y="277" font-size="17">政府予算制約</text>

    <text x="838" y="205" font-size="22" font-weight="700">資源制約</text>
    <text x="838" y="236" font-size="17">Y_t = C_t + G_t</text>
    <text x="838" y="262" font-size="17">g_t は C_t を押し下げる</text>
    <text x="838" y="288" font-size="17">zeta_a, zeta_g で解く</text>

    <text x="158" y="458" font-size="22" font-weight="700">一括税・移転</text>
    <text x="158" y="490" font-size="17">限界条件を変えない</text>
    <text x="158" y="516" font-size="17">政府債務の現在価値</text>

    <text x="728" y="458" font-size="22" font-weight="700">比例税</text>
    <text x="728" y="490" font-size="17">労働供給にくさび</text>
    <text x="728" y="516" font-size="17">税の帰着はくさびで決まる</text>
    <text x="728" y="542" font-size="17">ラッファーカーブ</text>
  </g>
</svg>
