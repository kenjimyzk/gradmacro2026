<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">TANKとRANKの乗数比</title>
  <desc id="desc">TANKとRANKの乗数比をType H比率lambdaの関数として描き、chiが1より大きい場合は増幅、1より小さい場合は抑制となることを示す図。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#34495e"/>
    </marker>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #1f2937; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #566273; }
      .axis { stroke: #34495e; stroke-width: 2.4; marker-end: url(#arrow); }
      .grid { stroke: #d8dee8; stroke-width: 1; }
      .one { stroke: #697386; stroke-width: 2; stroke-dasharray: 8 6; }
      .blue { stroke: #2f6fbe; stroke-width: 4; fill: none; }
      .green { stroke: #379b55; stroke-width: 4; fill: none; }
      .amber { stroke: #d9792f; stroke-width: 4; fill: none; }
      .danger { stroke: #c43b3b; stroke-width: 3; fill: none; stroke-dasharray: 8 7; }
      .label { font: 700 18px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #20242a; }
      .text { font: 400 15px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #34495e; }
      .math { font: 600 18px "Times New Roman", serif; fill: #20242a; }
      .note { font: 400 14px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #566273; }
      .box { fill: #ffffff; stroke: #c9d3df; stroke-width: 1.6; rx: 8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1100" height="620" fill="#ffffff"/>
  <rect x="44" y="34" width="1012" height="540" rx="18" fill="#f8fafc" stroke="#d9e0ea"/>
  <text class="title" x="74" y="82">TANK と RANK の総需要乗数の比</text>
  <text class="subtitle" x="76" y="112">通常領域では χ&gt;1 なら RANK より大きく、χ&lt;1 なら RANK より小さい</text>

  <line class="grid" x1="150" y1="430" x2="930" y2="430"/>
  <line class="grid" x1="150" y1="350" x2="930" y2="350"/>
  <line class="grid" x1="150" y1="270" x2="930" y2="270"/>
  <line class="axis" x1="150" y1="510" x2="960" y2="510"/>
  <line class="axis" x1="150" y1="510" x2="150" y2="150"/>
  <line class="one" x1="150" y1="350" x2="930" y2="350"/>

  <path class="green" d="M150 350 C300 333, 450 305, 600 250 C700 210, 770 172, 820 150"/>
  <path class="blue" d="M150 350 H930"/>
  <path class="amber" d="M150 350 C310 366, 500 385, 720 410 C815 421, 885 430, 930 436"/>
  <path class="danger" d="M820 150 C865 128, 902 118, 930 112"/>

  <text class="label" x="500" y="558">Type H 比率 λ</text>
  <text class="label" x="76" y="146">Ωᵀ/Ωᴿ</text>
  <text class="note" x="116" y="356">1</text>
  <text class="math" x="650" y="220">χ &gt; 1</text>
  <text class="math" x="770" y="342">χ = 1</text>
  <text class="math" x="670" y="430">χ &lt; 1</text>
  <text class="note" x="834" y="132">通常領域の外</text>

  <rect class="box" x="206" y="168" width="354" height="94"/>
  <text class="math" x="228" y="204">Ωᵀ/Ωᴿ = (1-λ)/(1-λχ)</text>
  <text class="text" x="228" y="234">分母が正の通常領域で比較する</text>
</svg>
