<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">期待項を落とした静学ケースの傾き比較</title>
  <desc id="desc">価格硬直性だけの場合、賃金硬直性だけの場合、二重硬直性で実質賃金が一定の場合の有効なフィリップス曲線の傾きを比較する図。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34495e"/>
    </marker>
    <style>
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #1f2937; }
      .subtitle { font: 400 16px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #566273; }
      .axis { stroke: #34495e; stroke-width: 2.4; marker-end: url(#arrow); }
      .grid { stroke: #d8dee8; stroke-width: 1; }
      .line-blue { stroke: #2f6fbe; stroke-width: 4; fill: none; }
      .line-amber { stroke: #d9792f; stroke-width: 4; fill: none; stroke-dasharray: 9 7; }
      .line-red { stroke: #c43b3b; stroke-width: 4.5; fill: none; }
      .label { font: 700 18px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #20242a; }
      .text { font: 400 15px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #34495e; }
      .math { font: 600 17px "Times New Roman", serif; fill: #20242a; }
      .note { font: 400 14px -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; fill: #566273; }
      .box { fill: #ffffff; stroke: #c9d3df; stroke-width: 1.6; rx: 8; }
    </style>
  </defs>

  <rect x="0" y="0" width="1100" height="620" fill="#ffffff"/>
  <rect x="44" y="34" width="1012" height="540" rx="18" fill="#f8fafc" stroke="#d9e0ea"/>
  <text class="title" x="74" y="82">期待項を落とした静学ケース：二重硬直性は傾きを小さくする</text>
  <text class="subtitle" x="76" y="112">例：kappa_p = kappa_w のとき、実質賃金が動かない局面では有効な傾きは半分になる</text>

  <line class="grid" x1="130" y1="430" x2="930" y2="430"/>
  <line class="grid" x1="130" y1="350" x2="930" y2="350"/>
  <line class="grid" x1="130" y1="270" x2="930" y2="270"/>
  <line class="grid" x1="130" y1="190" x2="930" y2="190"/>
  <line class="axis" x1="130" y1="510" x2="960" y2="510"/>
  <line class="axis" x1="130" y1="510" x2="130" y2="150"/>

  <text class="label" x="492" y="558">需給ギャップ x</text>
  <text class="label" x="72" y="142">インフレ率</text>
  <text class="note" x="115" y="535">0</text>

  <path class="line-blue" d="M130 510 L890 206"/>
  <path class="line-amber" d="M130 510 L890 206"/>
  <path class="line-red" d="M130 510 L890 358"/>

  <rect class="box" x="650" y="142" width="335" height="138"/>
  <line class="line-blue" x1="674" y1="174" x2="724" y2="174"/>
  <text class="text" x="736" y="180">価格硬直性だけ：kappa_p(gamma+phi)</text>
  <line class="line-amber" x1="674" y1="211" x2="724" y2="211"/>
  <text class="text" x="736" y="217">賃金硬直性だけ：kappa_w(gamma+phi)</text>
  <line class="line-red" x1="674" y1="248" x2="724" y2="248"/>
  <text class="text" x="736" y="254">二重硬直性：kappa_bar(gamma+phi)</text>

  <text class="math" x="182" y="206">pi = kappa_p(gamma+phi)x</text>
  <text class="math" x="182" y="375">pi = kappa_bar(gamma+phi)x</text>
  <text class="note" x="182" y="404">kappa_bar = (1/kappa_p + 1/kappa_w)^{-1}</text>
</svg>
